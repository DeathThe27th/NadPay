<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="800" height="1000" fill="#ece6fa"/>
  <circle cx="120" cy="140" r="190" fill="#e2d9f7"/>
  <circle cx="720" cy="920" r="230" fill="#e2d9f7"/>

  <!-- app card -->
  <g>
    <rect x="90" y="190" width="620" height="620" rx="36" fill="#ffffff"/>
    <rect x="90" y="190" width="620" height="620" rx="36" fill="none" stroke="#ddd4f2" stroke-width="2"/>

    <text x="140" y="278" font-size="40" font-weight="700" fill="#2b2740">My team</text>
    <text x="140" y="318" font-size="24" fill="#6f6a85">Saved on-chain, reused every payday</text>

    <!-- rows -->
    <g font-size="24">
      <g>
        <circle cx="168" cy="398" r="24" fill="#6d4fe3"/>
        <text x="160" y="407" font-size="22" fill="#ffffff" font-weight="700">A</text>
        <text x="212" y="407" font-family="ui-monospace, monospace" fill="#2b2740">0x7f3a…c21d</text>
        <rect x="518" y="374" width="152" height="48" rx="24" fill="#f1edfb"/>
        <text x="594" y="406" text-anchor="middle" font-weight="700" fill="#5a3fc9">1.2 MON</text>
      </g>
      <g>
        <circle cx="168" cy="486" r="24" fill="#9f8af0"/>
        <text x="160" y="495" font-size="22" fill="#ffffff" font-weight="700">B</text>
        <text x="212" y="495" font-family="ui-monospace, monospace" fill="#2b2740">0x94e2…88af</text>
        <rect x="518" y="462" width="152" height="48" rx="24" fill="#f1edfb"/>
        <text x="594" y="494" text-anchor="middle" font-weight="700" fill="#5a3fc9">0.8 MON</text>
      </g>
      <g>
        <circle cx="168" cy="574" r="24" fill="#c3b5f6"/>
        <text x="160" y="583" font-size="22" fill="#5a3fc9" font-weight="700">C</text>
        <text x="212" y="583" font-family="ui-monospace, monospace" fill="#2b2740">0x1bd8…04e7</text>
        <rect x="518" y="550" width="152" height="48" rx="24" fill="#f1edfb"/>
        <text x="594" y="582" text-anchor="middle" font-weight="700" fill="#5a3fc9">1.5 MON</text>
      </g>
      <g>
        <circle cx="168" cy="662" r="24" fill="#7b62e8"/>
        <text x="160" y="671" font-size="22" fill="#ffffff" font-weight="700">D</text>
        <text x="212" y="671" font-family="ui-monospace, monospace" fill="#2b2740">0xc05f…9b32</text>
        <rect x="518" y="638" width="152" height="48" rx="24" fill="#f1edfb"/>
        <text x="594" y="670" text-anchor="middle" font-weight="700" fill="#5a3fc9">1.3 MON</text>
      </g>
    </g>

    <line x1="140" y1="712" x2="660" y2="712" stroke="#e5e1f0" stroke-width="2"/>
    <text x="140" y="768" font-size="26" fill="#6f6a85">Total per payday</text>
    <text x="660" y="768" font-size="30" font-weight="700" text-anchor="end" fill="#2b2740">4.8 MON</text>
  </g>
</svg>
