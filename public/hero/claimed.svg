<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="800" height="1000" fill="#faf9fe"/>
  <!-- dot grid -->
  <defs>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#ded6f4"/>
    </pattern>
  </defs>
  <rect width="800" height="1000" fill="url(#dots)"/>

  <!-- confetti -->
  <g>
    <rect x="180" y="180" width="16" height="16" rx="4" fill="#6d4fe3" transform="rotate(24 188 188)"/>
    <rect x="600" y="150" width="14" height="14" rx="4" fill="#2e9e6b" transform="rotate(-18 607 157)"/>
    <rect x="660" y="330" width="16" height="16" rx="4" fill="#9f8af0" transform="rotate(40 668 338)"/>
    <rect x="130" y="380" width="12" height="12" rx="3" fill="#f2b43a" transform="rotate(-30 136 386)"/>
    <rect x="560" y="760" width="16" height="16" rx="4" fill="#6d4fe3" transform="rotate(12 568 768)"/>
    <rect x="200" y="800" width="12" height="12" rx="3" fill="#2e9e6b" transform="rotate(-24 206 806)"/>
  </g>

  <!-- claim card -->
  <g>
    <rect x="120" y="280" width="560" height="470" rx="36" fill="#ffffff" stroke="#e5e1f0" stroke-width="2"/>
    <circle cx="400" cy="430" r="72" fill="#e3f5ec"/>
    <path d="M 366 430 l 24 26 l 46 -52" fill="none" stroke="#2e9e6b" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="400" y="580" font-size="46" font-weight="800" text-anchor="middle" fill="#2b2740">Claimed!</text>
    <text x="400" y="636" font-size="28" text-anchor="middle" fill="#6f6a85">1.6 MON → your wallet</text>
    <rect x="264" y="668" width="272" height="44" rx="22" fill="#f1edfb"/>
    <text x="400" y="697" font-size="22" font-weight="600" text-anchor="middle" fill="#5a3fc9">settled on Monad</text>
  </g>
</svg>
